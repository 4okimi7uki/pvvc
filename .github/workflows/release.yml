name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.4"

      - name: Build all
        run: make build-all VERSION=${{ github.ref_name }}

      - name: Create GitHub Release and upload dist
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true
          body: |
            ## Downloads
            Choose the binary that matches your OS and CPU architecture.

            | OS / Arch | Artifact |
            | --- | --- |
            | macOS / arm64 (Apple Silicon) | [pvvc_mac_arm64](https://github.com/4okimi7uki/pvvc/releases/download/${{ github.ref_name }}/pvvc_mac_arm64) |
            | macOS / amd64 (Intel) | [pvvc_mac_amd64](https://github.com/4okimi7uki/pvvc/releases/download/${{ github.ref_name }}/pvvc_mac_amd64) |
            | Linux / amd64 | [pvvc_linux_amd64](https://github.com/4okimi7uki/pvvc/releases/download/${{ github.ref_name }}/pvvc_linux_amd64) |
            | Windows / amd64 | [pvvc.exe](https://github.com/4okimi7uki/pvvc/releases/download/${{ github.ref_name }}/pvvc.exe) |
