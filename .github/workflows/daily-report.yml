name: Daily Report

on:
  # schedule:
  #   - cron: "10 1,7 * * *" # Runs every day at 10:10 and 16:10 JST
  workflow_dispatch:
    inputs:
      stage:
        description: "Slack environment"
        required: true
        default: "prod"
        type: choice
        options:
          - dev
          - prod
      llm:
        description: "LLM for analyzing"
        required: false
        default: "gemini"
        type: choice
        options:
          - gemini
          - claude

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      TEAM_ID: ${{ secrets.TEAM_ID }}
      PROJECT_ID: ${{ secrets.PROJECT_ID }}
      PROJECT_IDS: ${{ secrets.PROJECT_IDS }}
      PROPERTY_ID: ${{ secrets.PROPERTY_ID }}
      GOOGLE_ANALYTICS_CREDENTIAL: ${{ secrets.GOOGLE_ANALYTICS_CREDENTIAL }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
      TARGET_WEBSITE_NAME: ${{ secrets.TARGET_WEBSITE_NAME }}
      WEBHOOK_PROD: ${{ secrets.WEBHOOK_PROD }}
      WEBHOOK_DEV: ${{ secrets.WEBHOOK_DEV }}

    steps:
      - name: Set Slack webhook URL
        run: |
          STAGE="${{ inputs.stage || 'prod' }}"
          if [ "$STAGE" = "prod" ]; then
            echo "SLACK_WEBHOOK_URL=$WEBHOOK_PROD" >> $GITHUB_ENV
          else
            echo "SLACK_WEBHOOK_URL=$WEBHOOK_DEV" >> $GITHUB_ENV
          fi

      - name: Download pvvc binary
        run: |
          gh release download \
            --repo 4okimi7uki/pvvc \
            --pattern "pvvc_linux_amd64" \
            --dir /tmp/pvvc
          chmod +x /tmp/pvvc/pvvc_linux_amd64
          sudo mv /tmp/pvvc/pvvc_linux_amd64 /usr/local/bin/pvvc
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch prompt
        run: |
          curl -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -o prompt.tmpl \
            https://raw.githubusercontent.com/4okimi7uki/pvvc/main/internal/ai/templates/analyze.tmpl

      - name: Analyze and notify Slack
        run: |
          LLM="${{ inputs.llm || 'gemini' }}"
          for i in 1 2 3; do
            pvvc analyze \
            --llm "$LLM" \
            --prompt prompt.tmpl \
            --notify --quiet && exit 0
            [ $i -lt 3 ] && echo "Attempt $i failed. Retrying in 30s..." && sleep 30
          done
          exit 1
